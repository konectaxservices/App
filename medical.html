<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medical Translator – KonectaX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#fff3f3,#ffe0e0);margin:0;padding:0;}
    .navbar{background-color:#00bcd4;} .navbar-brand,.nav-link{color:#fff!important;font-weight:600;} .nav-link:hover{color:#e0f7fa!important;}
    .page-hero{background:linear-gradient(135deg,#c62828,#ef5350);padding:130px 0 70px;text-align:center;color:white;}
    .page-hero h1{font-size:2.5rem;font-weight:700;} .page-hero p{font-size:1.1rem;max-width:650px;margin:12px auto 0;}
    .form-section{background:#fff;padding:50px 40px;border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,0.08);max-width:900px;margin:-40px auto 60px;position:relative;z-index:10;}
    .form-section h2{text-align:center;color:#c62828;font-size:1.8rem;margin-bottom:30px;}
    .form-control,.form-select{background-color:#fff8f8;border-color:#ffcccc;border-radius:8px;}
    .form-control:focus,.form-select:focus{box-shadow:0 0 0 0.2rem rgba(198,40,40,.2);border-color:#c62828;}
    .btn-submit{background:#c62828;border:none;padding:13px 40px;color:white;font-weight:bold;border-radius:30px;font-size:1rem;transition:background .3s;}
    .btn-submit:hover{background:#b71c1c;} .btn-submit:disabled{background:#aaa;}
    footer{background:#333;color:#ccc;padding:30px 0;text-align:center;font-size:14px;}
    footer a{color:#ccc;margin:0 10px;text-decoration:none;} footer a:hover{color:#00bcd4;}
    @media(max-width:576px){.form-section{padding:30px 18px;margin:-30px 12px 40px;}.page-hero h1{font-size:1.8rem;}}
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html"><img src="logo.png" style="height:38px;" alt="Logo"><span>KONECTAXSERVICES</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="nav"><ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="index.html#services">Services</a></li>
      <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
      <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
    </ul></div>
  </div>
</nav>
<section class="page-hero">
  <div class="container">
    <h1><i class="fas fa-notes-medical me-2"></i>Medical Translator</h1>
    <p>Translate prescriptions, reports, and medical documents in your preferred language — quickly and accurately.</p>
  </div>
</section>
<div class="form-section">
  <h2>Request Translation</h2>
  <div class="row g-3">
    <div class="col-md-6"><label class="form-label fw-semibold">Full Name *</label><input type="text" class="form-control" id="med-name" placeholder="Your full name" required></div>
    <div class="col-md-6"><label class="form-label fw-semibold">Email Address *</label><input type="email" class="form-control" id="med-email" placeholder="your@email.com" required></div>
    <div class="col-md-6"><label class="form-label fw-semibold">Phone Number</label><input type="tel" class="form-control" id="med-phone" placeholder="+91 ..."></div>
    <div class="col-md-6"><label class="form-label fw-semibold">Translate From</label>
      <select class="form-select" id="med-from"><option value="">Select Language</option><option>English</option><option>Arabic</option><option>Hindi</option><option>Somali</option><option>French</option><option>Other</option></select>
    </div>
    <div class="col-md-6"><label class="form-label fw-semibold">Translate To</label>
      <select class="form-select" id="med-to"><option value="">Select Language</option><option>English</option><option>Arabic</option><option>Hindi</option><option>Somali</option><option>French</option><option>Other</option></select>
    </div>
    <div class="col-md-6"><label class="form-label fw-semibold">Document Type</label>
      <select class="form-select" id="med-doctype"><option value="">Select</option><option>Prescription</option><option>Medical Report</option><option>Discharge Summary</option><option>Lab Results</option><option>Other</option></select>
    </div>
    <div class="col-12"><label class="form-label fw-semibold">Additional Details *</label><textarea class="form-control" id="med-message" rows="5" placeholder="Describe what you need translated and any specific requirements..." required></textarea></div>
    <div class="col-12 text-center mt-3">
      <button class="btn btn-submit" id="med-submit" onclick="submitMedForm()"><i class="fas fa-paper-plane me-2"></i>Submit Request</button>
    </div>
    <div class="col-12 text-center mt-2" id="med-response" style="display:none;"></div>
  </div>
</div>
<footer><div class="container"><p>&copy; 2025 KonectaX. All Rights Reserved.</p><p><a href="index.html">Home</a> | <a href="about.html">About</a> | <a href="contact.html">Contact</a></p></div></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="form-submit.js"></script>
<script>
function submitMedForm(){
  const name=document.getElementById('med-name').value.trim();
  const email=document.getElementById('med-email').value.trim();
  const message=document.getElementById('med-message').value.trim();
  const btn=document.getElementById('med-submit');const rb=document.getElementById('med-response');
  if(!name||!email||!message){rb.style.display='block';rb.style.color='red';rb.innerHTML='<i class="fas fa-exclamation-circle me-1"></i>Please fill required fields.';return;}
  btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin me-2"></i>Submitting...';
  submitToGoogleSheet({
    formType:'Medical Translator',name,email,
    phone:document.getElementById('med-phone').value,
    translateFrom:document.getElementById('med-from').value,
    translateTo:document.getElementById('med-to').value,
    documentType:document.getElementById('med-doctype').value,
    message,timestamp:new Date().toLocaleString()
  }).then(()=>{
    btn.innerHTML='<i class="fas fa-check me-2"></i>Submitted!';
    rb.style.display='block';rb.style.color='green';
    rb.innerHTML='<i class="fas fa-check-circle me-1"></i>Request received! Our team will contact you within 24 hours.';
    setTimeout(()=>{btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane me-2"></i>Submit Request';},3000);
  }).catch(()=>{btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane me-2"></i>Submit Request';rb.style.display='block';rb.style.color='red';rb.innerHTML='<i class="fas fa-exclamation-circle me-1"></i>Error. Please try again.';});
}
</script>
</body>
</html>
